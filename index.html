<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THB Currency Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Arial', 'sans-serif'],
          },
        },
      },
      darkMode: 'class',
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gray-100 dark:bg-[#1a1a1a] dark:text-gray-200 font-sans text-base overflow-y-hidden transition-colors duration-300">
  <div class="min-h-screen flex flex-col items-center justify-center px-8">
    <form class="bg-white dark:bg-[#2a2a2a] rounded-2xl shadow-lg p-8 w-full max-w-[340px] flex flex-col gap-4 mx-4 relative" autocomplete="off" onsubmit="return false;">
      <button id="theme-toggle" class="absolute top-4 right-4 w-9 h-9 rounded-full border-[1.5px] border-black/10 dark:border-white/15 bg-white/90 dark:bg-[#2a2a2a]/90 text-gray-800 dark:text-gray-200 cursor-pointer flex items-center justify-center transition-all duration-200 z-10 shadow-md hover:bg-white dark:hover:bg-[#2a2a2a] hover:border-black/15 dark:hover:border-white/20 hover:shadow-lg active:scale-95 select-none" aria-label="Toggle dark mode">
        <svg id="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <div class="text-center text-2xl font-semibold tracking-tight text-gray-800 dark:text-gray-200 mb-4 mt-2 pt-2">Currency Converter</div>
      <div class="flex items-center justify-start gap-2 mb-4">
        <label for="currency-select" class="text-sm text-gray-600 dark:text-gray-400 mb-0">Convert to:</label>
        <select id="currency-select" class="text-base px-4 py-2 border-[1.5px] border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-[#1e1e1e] outline-none transition-all duration-200 cursor-pointer min-w-[96px] text-gray-800 dark:text-gray-200 font-medium hover:border-gray-400 dark:hover:border-gray-500 hover:bg-gray-50 dark:hover:bg-[#252525] focus:border-blue-500 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-[#1e1e1e] focus:ring-4 focus:ring-blue-500/10 dark:focus:ring-blue-500/20">
          <option value="idr">IDR</option>
          <option value="php">PHP</option>
          <option value="jpy">JPY</option>
        </select>
      </div>
      <button id="camera-btn" class="flex items-center justify-center gap-2 px-6 py-3 bg-blue-500 hover:bg-blue-700 text-white border-none rounded-xl text-base font-medium font-sans cursor-pointer transition-all duration-200 mb-4 w-full hover:-translate-y-px hover:shadow-lg active:translate-y-0" type="button" aria-label="Open camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        <span>Camera</span>
      </button>
      <div class="flex flex-col gap-2">
        <label for="thb" class="text-base text-gray-500 dark:text-gray-400 mb-2">THB <span id="thb-rate" class="text-base text-gray-500 dark:text-gray-400 font-normal ml-2"></span></label>
        <input id="thb" type="number" inputmode="decimal" placeholder="0" min="0" step="any" class="text-xl px-4 py-2 border-[1.5px] border-gray-300 dark:border-gray-600 rounded-2xl bg-white dark:bg-[#1e1e1e] outline-none transition-all duration-200 w-full box-border text-right text-gray-800 dark:text-gray-200 hover:border-gray-400 dark:hover:border-gray-500 hover:bg-gray-50 dark:hover:bg-[#252525] focus:border-blue-500 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-[#1e1e1e] focus:ring-4 focus:ring-blue-500/10 dark:focus:ring-blue-500/20">
      </div>
      <div class="flex justify-center items-center h-8 my-4">
        <svg class="arrow-svg w-8 h-8 stroke-gray-400 dark:stroke-gray-600 stroke-2 fill-none block" aria-hidden="true" viewBox="0 0 24 36">
          <path d="M12 5v26M12 5l-6 6M12 5l6 6" />
          <path d="M12 31V5M12 31l-6-6M12 31l6-6" />
        </svg>
      </div>
      <div class="flex flex-col gap-2">
        <label for="second-currency" id="second-currency-label" class="text-base text-gray-500 dark:text-gray-400 mb-2">IDR <span id="second-currency-rate" class="text-base text-gray-500 dark:text-gray-400 font-normal ml-2"></span></label>
        <input id="second-currency" type="number" inputmode="decimal" placeholder="0" min="0" step="any" class="text-xl px-4 py-2 border-[1.5px] border-gray-300 dark:border-gray-600 rounded-2xl bg-white dark:bg-[#1e1e1e] outline-none transition-all duration-200 w-full box-border text-right text-gray-800 dark:text-gray-200 hover:border-gray-400 dark:hover:border-gray-500 hover:bg-gray-50 dark:hover:bg-[#252525] focus:border-blue-500 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-[#1e1e1e] focus:ring-4 focus:ring-blue-500/10 dark:focus:ring-blue-500/20">
      </div>
    </form>
  </div>
  
  <!-- Camera Modal -->
  <div id="camera-modal" class="hidden fixed inset-0 w-full h-full bg-black/90 z-[1000] items-center justify-center flex-col" style="display: none;">
    <div class="w-full max-w-[90vw] max-h-[90vh] flex flex-col bg-black rounded-2xl overflow-hidden">
      <div class="flex justify-between items-center p-4 bg-white/10 text-white">
        <h3 class="m-0 text-xl font-semibold">Camera</h3>
        <button id="close-camera" class="bg-transparent border-none text-white text-3xl cursor-pointer p-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors duration-200 hover:bg-white/20" aria-label="Close camera">×</button>
      </div>
      <video id="camera-video" autoplay playsinline class="w-full max-h-[60vh] object-contain bg-black"></video>
      <canvas id="camera-canvas" style="display: none;"></canvas>
      <div id="ocr-status" class="hidden flex items-center justify-center gap-3 p-4 bg-white/15 text-white text-sm" style="display: none;">
        <div class="ocr-spinner w-5 h-5"></div>
        <span>Reading numbers...</span>
      </div>
      <div class="flex gap-4 p-4 justify-center bg-white/10">
        <button id="capture-btn" class="px-8 py-3 border-none rounded-lg text-base font-medium font-sans cursor-pointer transition-all duration-200 bg-blue-500 text-white hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed" type="button">Capture</button>
        <button id="stop-camera" class="px-8 py-3 border-none rounded-lg text-base font-medium font-sans cursor-pointer transition-all duration-200 bg-red-500 text-white hover:bg-red-700" type="button">Close</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
