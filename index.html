<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THB Currency Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <form class="converter" autocomplete="off" onsubmit="return false;">
      <div class="box-title">Currency Converter</div>
      <div class="currency-selector">
        <label for="currency-select">Convert to:</label>
        <select id="currency-select">
          <option value="idr">IDR</option>
          <option value="php">PHP</option>
        </select>
      </div>
      <button id="camera-btn" class="camera-btn" type="button" aria-label="Open camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        <span>Camera</span>
      </button>
      <div class="field">
        <label for="thb">THB <span id="thb-rate" class="rate-info"></span></label>
        <input id="thb" type="number" inputmode="decimal" placeholder="0" min="0" step="any">
      </div>
      <div class="arrow-box">
        <svg class="arrow-svg" aria-hidden="true" viewBox="0 0 24 36">
          <path d="M12 5v26M12 5l-6 6M12 5l6 6" />
          <path d="M12 31V5M12 31l-6-6M12 31l6-6" />
        </svg>
      </div>
      <div class="field">
        <label for="second-currency" id="second-currency-label">IDR <span id="second-currency-rate" class="rate-info"></span></label>
        <input id="second-currency" type="number" inputmode="decimal" placeholder="0" min="0" step="any">
      </div>
    </form>
  </div>
  
  <!-- Camera Modal -->
  <div id="camera-modal" class="camera-modal" style="display: none;">
    <div class="camera-modal-content">
      <div class="camera-modal-header">
        <h3>Camera</h3>
        <button id="close-camera" class="close-btn" aria-label="Close camera">×</button>
      </div>
      <video id="camera-video" autoplay playsinline></video>
      <canvas id="camera-canvas" style="display: none;"></canvas>
      <div id="ocr-status" class="ocr-status" style="display: none;">
        <div class="ocr-spinner"></div>
        <span>Reading numbers...</span>
      </div>
      <div class="camera-controls">
        <button id="capture-btn" class="capture-btn" type="button">Capture</button>
        <button id="stop-camera" class="stop-btn" type="button">Close</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
